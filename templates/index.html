<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CRM - Dynamic Programming</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

<div class="max-w-4xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6 text-center">CRM</h1>

  <!-- Cadastro de Lead -->
  <div class="bg-gray-800 p-6 rounded-2xl shadow mb-6">
    <h2 class="text-xl mb-4">Cadastrar Lead</h2>
    <input id="nome" placeholder="Nome" class="w-full p-2 mb-2 text-black rounded">
    <input id="telefone" placeholder="Telefone" class="w-full p-2 mb-2 text-black rounded">
    <input id="email" placeholder="Email" class="w-full p-2 mb-2 text-black rounded">
    <input id="cpf" placeholder="CPF" class="w-full p-2 mb-4 text-black rounded">
    <button onclick="cadastrarLead()" class="bg-green-500 px-4 py-2 rounded">Cadastrar</button>
    <p id="resultadoCadastro" class="mt-3"></p>
  </div>

  <!-- Buscar Lead -->
  <div class="bg-gray-800 p-6 rounded-2xl shadow mb-6">
    <h2 class="text-xl mb-4">Buscar Lead</h2>
    <input id="buscarCpf" placeholder="CPF" class="w-full p-2 mb-4 text-black rounded">
    <button onclick="buscarLead()" class="bg-blue-500 px-4 py-2 rounded">Buscar</button>
    <pre id="resultadoBusca" class="mt-3"></pre>
  </div>

  <!-- Agendamento -->
  <div class="bg-gray-800 p-6 rounded-2xl shadow">
    <h2 class="text-xl mb-4">Agendamento</h2>
    <textarea id="intervalos" placeholder="Ex: [[1,3],[2,5],[4,7]]" class="w-full p-2 mb-4 text-black rounded"></textarea>
    <button onclick="calcularAgenda()" class="bg-purple-500 px-4 py-2 rounded">Calcular</button>
    <p id="resultadoAgenda" class="mt-3"></p>
  </div>
</div>

<script>
const API = "";

async function cadastrarLead() {
  const data = {
    nome: document.getElementById("nome").value,
    telefone: document.getElementById("telefone").value,
    email: document.getElementById("email").value,
    cpf: document.getElementById("cpf").value
  };

  const res = await fetch(API + "/adicionar_lead", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const json = await res.json();
  document.getElementById("resultadoCadastro").innerText = JSON.stringify(json);
}

async function buscarLead() {
  const cpf = document.getElementById("buscarCpf").value;

  const res = await fetch(API + "/buscar/" + cpf);
  const json = await res.json();

  document.getElementById("resultadoBusca").innerText = JSON.stringify(json, null, 2);
}

async function calcularAgenda() {
  const intervalos = JSON.parse(document.getElementById("intervalos").value);

  const res = await fetch(API + "/agendar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ intervalos })
  });

  const json = await res.json();
  document.getElementById("resultadoAgenda").innerText = JSON.stringify(json);
}
</script>

</body>
</html>
